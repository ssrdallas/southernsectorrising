[build]
  command   = "npm run build"
  publish   = ".next"

[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Redirect root to www (optional — remove if client prefers apex domain)
# [[redirects]]
#   from   = "https://southernsectorrising.org/*"
#   to     = "https://www.southernsectorrising.org/:splat"
#   status = 301
#   force  = true

# Headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"
