<!DOCTYPE html>
<html>
<head><title>Netlify Forms</title></head>
<body>

<!-- contact form -->
<form name="contact" data-netlify="true" hidden>
  <input type="hidden" name="form-name" value="contact" />
  <input type="text" name="name" />
  <input type="email" name="email" />
  <input type="tel" name="phone" />
  <select name="subject"></select>
  <textarea name="message"></textarea>
</form>

<!-- volunteer-signup form -->
<form name="volunteer-signup" data-netlify="true" hidden>
  <input type="hidden" name="form-name" value="volunteer-signup" />
  <input type="text" name="first_name" />
  <input type="text" name="last_name" />
  <input type="email" name="email" />
  <input type="tel" name="phone" />
  <input type="text" name="city_zip" />
  <select name="how_heard"></select>
  <input type="checkbox" name="interests" />
  <textarea name="message"></textarea>
</form>

<!-- tour-request form -->
<form name="tour-request" data-netlify="true" hidden>
  <input type="hidden" name="form-name" value="tour-request" />
  <input type="text" name="name" />
  <input type="text" name="organization" />
  <input type="email" name="email" />
  <input type="tel" name="phone" />
  <input type="text" name="preferred_dates" />
  <input type="text" name="group_size" />
  <textarea name="message"></textarea>
</form>

<!-- events-signup form -->
<form name="events-signup" data-netlify="true" hidden>
  <input type="hidden" name="form-name" value="events-signup" />
  <input type="text" name="name" />
  <input type="email" name="email" />
</form>

<!-- newsletter form -->
<form name="newsletter" data-netlify="true" hidden>
  <input type="hidden" name="form-name" value="newsletter" />
  <input type="email" name="email" />
</form>

</body>
</html>
