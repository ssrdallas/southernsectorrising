[build]
  command   = "npm run build"
  publish   = ".next"

[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Redirect root to www (optional — remove if client prefers apex domain)
# [[redirects]]
#   from   = "https://southernsectorrising.org/*"
#   to     = "https://www.southernsectorrising.org/:splat"
#   status = 301
#   force  = true

# Headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options           = "DENY"
    X-Content-Type-Options    = "nosniff"
    Referrer-Policy           = "strict-origin-when-cross-origin"
    Permissions-Policy        = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy   = "default-src 'self'; script-src 'self' 'unsafe-inline' https://js.stripe.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; frame-src https://www.youtube.com https://www.youtube-nocookie.com https://player.vimeo.com https://maps.google.com https://js.stripe.com; img-src 'self' data: blob: https:; connect-src 'self' https://api.stripe.com https://r.stripe.com https://m.stripe.com; worker-src blob:; frame-ancestors 'none';"
